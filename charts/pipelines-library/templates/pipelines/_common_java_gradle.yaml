{{- define "java-gradle-build-common" -}}
- name: build
  taskRef:
    kind: Task
    name: edp-gradle
  runAfter:
    - get-cache
    - update-build-number
  params:
    - name: BASE_IMAGE
      value: $(params.image)
  workspaces:
    - name: source
      workspace: shared-workspace

{{- if not (and (eq .framework "java25") .java25SkipSonar) }}
- name: sonar
  taskRef:
    kind: Task
    name: sonarqube-gradle
  runAfter:
    - build
  params:
    - name: BASE_IMAGE
      value: $(params.sonar_image)
    - name: SONAR_PROJECT_KEY
      value: $(params.CODEBASE_NAME)
    - name: SONAR_PROJECT_NAME
      value: $(params.CODEBASE_NAME)
    - name: branch
      value: $(params.git-source-revision)
    - name: EXTRA_COMMANDS
      value: "-DskipTests sonarqube"
  workspaces:
    - name: source
      workspace: shared-workspace
      subPath: source
{{- end }}

- name: push
  taskRef:
    kind: Task
    name: gradle
  runAfter:
{{- if not (and (eq .framework "java25") .java25SkipSonar) }}
    - sonar
{{- else }}
    - build
{{- end }}
  params:
    - name: BASE_IMAGE
      value: $(params.image)
    - name: EXTRA_ARGS
      value: |
        -Dorg.gradle.internal.publish.checksums.insecure=true \
        -PsnapshotsRepoUrl=${NEXUS_HOST_URL}${SNAPSHOTS_REPO_PATH} \
        -PreleasesRepoUrl=${NEXUS_HOST_URL}${RELEASES_REPO_PATH} \
        publish -i
  workspaces:
    - name: source
      workspace: shared-workspace
      subPath: source
{{- end -}}

