{{ if has "gitlab" .Values.global.gitProviders }}
{{ if .Values.pipelines.deployableResources.gitops }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitlab-helm-gitops-sys-review
  labels:
    app.edp.epam.com/pipelinetype: review
    app.edp.epam.com/triggertemplate: gitlab-review-template
    {{- include "edp-tekton.labels" . | nindent 4 }}
spec:
  description: The Review pipeline for linting and validating manifests in the GitOps system repository
  workspaces:
    - name: shared-workspace
    - name: ssh-creds
  params:
    {{- include "edp-tekton.pipelineUrlParam" $ | nindent 4 }}
    - name: git-source-url
      default: "https://github.com/sergk/spring-petclinic"
      description: git url to clone
      type: string
    - name: git-source-revision
      description: 'git revision to checkout (branch, tag, sha, ref…)'
      default: "main"
      type: string
    - name: git-refspec
      description: >-
        Refspec to fetch before checking out revision. When the diff preview is
        enabled, branch heads are fetched so it can reconstruct the MR target
        branch locally.
      default: {{ if .Values.pipelines.argocdDiffPreview.enabled }}"+refs/heads/*:refs/remotes/origin/*"{{ else }}""{{ end }}
      type: string
    - name: CODEBASE_NAME
      default: krci-gitops
      description: "Project name"
      type: string
    - name: targetBranch
      description: Target branch of the Merge Request, used as the diff preview base
      default: main
      type: string
    - name: changeNumber
      description: Change number from Merge Request
      type: string
    - name: gitfullrepositoryname
      description: "repository full name"
      type: string
  tasks:

{{- include "gitlab-review-start" $ | nindent 4 }}

    - name: yaml-lint
      runAfter:
        - init-values
      taskRef:
        kind: Task
        name: yaml-lint
      workspaces:
        - name: source
          subPath: source
          workspace: shared-workspace

{{- if .Values.pipelines.argocdDiffPreview.enabled }}
    - name: argocd-diff-preview
      runAfter:
        - yaml-lint
      taskRef:
        kind: Task
        name: argocd-diff-preview
      params:
        - name: GITOPS_URL
          value: $(params.git-source-url)
        - name: TARGET_REVISION
          value: $(params.git-source-revision)
        - name: BASE_BRANCH
          value: $(params.targetBranch)
        - name: CHANGE_NUMBER
          value: $(params.changeNumber)
        - name: REPO_FULL_NAME
          value: $(params.gitfullrepositoryname)
      workspaces:
        - name: source
          workspace: shared-workspace
{{- end }}

{{ include "gitlab-review-vote" . | nindent 2 }}

{{ end }}
{{ end }}
