{{ if and (has "gitlab" .Values.global.gitProviders) .Values.pipelines.deployableResources.security }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitlab-security-scan
  labels:
    {{- include "edp-tekton.labels" $ | nindent 4 }}
    app.edp.epam.com/triggertemplate: gitlab-security-template
    app.edp.epam.com/pipelinetype: security
spec:
  description: >-
    A specialized pipeline for GitLab projects that executes a trio of security tools:
    gitleaks for detecting credential exposure, cdxgen for dependency analysis and SBOM creation,
    semgrep for identifying code vulnerabilities, and container image vulnerability scanning via
    Trivy and Grype (when a Helm chart is present). Security findings are automatically
    synchronized with DefectDojo for comprehensive vulnerability lifecycle management.
  workspaces:
    - name: shared-workspace
    - name: ssh-creds
  params:
    - name: pipelineUrl
      default: https://portal-{{ $.Release.Namespace }}.{{ $.Values.global.dnsWildCard }}/c/main/pipelines/pipelineruns/$(context.pipelineRun.namespace)/$(context.pipelineRun.name)
      type: string
    - name: git-source-revision
      description: 'git revision to checkout (branch, tag, sha, ref…)'
      default: "main"
      type: string
    - name: git-source-url
      description: 'url to checkout'
      default: "https://gitlab.com/Rolika4/springboot.git"
      type: string
    - name: CODEBASE_NAME
      default: 'gradle'
      description: "Project name"
      type: string
    - name: IMAGE_TAG
      description: "Version tag for helm --set image.tag= and DefectDojo version tracking. If empty, helm template uses chart defaults."
      default: ""
      type: string
  results:
    - description: DefectDojo URL with the generated vulnerability scan reports
      name: SCAN_REPORT_URL
      type: string
      value: $(tasks.security.results.SCAN_REPORT_URL)
    - description: DefectDojo URL with container image vulnerability scan reports
      name: IMAGE_SCAN_REPORT_URL
      type: string
      value: $(tasks.image-scan-chart.results.SCAN_REPORT_URL)
  tasks:
    - name: fetch-repository
      taskRef:
        kind: Task
        name: git-clone
      params:
        - name: url
          value: $(params.git-source-url)
        - name: revision
          value: $(params.git-source-revision)
        - name: subdirectory
          value: source
      workspaces:
        - name: output
          workspace: shared-workspace
        - name: ssh-directory
          workspace: ssh-creds

    - name: security
      taskRef:
        kind: Task
        name: security
      runAfter:
        - fetch-repository
      params:
        - name: CODEBASE_NAME
          value: $(params.CODEBASE_NAME)
        - name: CODEBASE_BRANCH
          value: $(params.git-source-revision)
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: source

    - name: image-scan-chart
      taskRef:
        kind: Task
        name: image-scan-chart
      runAfter:
        - fetch-repository
      params:
        - name: CODEBASE_NAME
          value: $(params.CODEBASE_NAME)
        - name: CODEBASE_BRANCH
          value: $(params.git-source-revision)
        - name: IMAGE_TAG
          value: $(params.IMAGE_TAG)
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: source
{{ end }}
