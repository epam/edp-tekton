{{- if eq .Values.reporter.enabled true }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "edp-tekton-reporter.name" . }}
  labels:
    {{- include "edp-tekton-reporter.labels" . | nindent 4 }}
rules:
  - verbs:
      - get
      - list
      - watch
      - patch
    apiGroups:
      - tekton.dev
    resources:
      - pipelineruns

  - verbs:
      - get
      - list
      - watch
    apiGroups:
      - tekton.dev
    resources:
      - taskruns

  - verbs:
      - get
      - list
    apiGroups:
      - ''
    resources:
      - pods

  - verbs:
      - get
    apiGroups:
      - ''
    resources:
      - pods/log

  - verbs:
      - get
    apiGroups:
      - ''
    resources:
      - secrets

  - verbs:
      - get
      - list
      - watch
    apiGroups:
      - v2.edp.epam.com
    resources:
      - codebases
      - codebases/status
      - codebases/finalizers

  - verbs:
      - get
      - list
      - watch
    apiGroups:
      - v2.edp.epam.com
    resources:
      - gitservers
      - gitservers/status
      - gitservers/finalizers

  # Leader election.
  - verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
    apiGroups:
      - coordination.k8s.io
    resources:
      - leases

  - verbs:
      - create
      - patch
    apiGroups:
      - ''
    resources:
      - events
{{- end }}
