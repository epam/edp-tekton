{{ if .Values.pipelines.deployableResources.tasks }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bitbucket-set-status
  labels:
    app.kubernetes.io/version: "0.4"
  annotations:
    tekton.dev/categories: Git
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: bitbucket
    tekton.dev/displayName: "set bitbucket status"
    tekton.dev/platforms: "linux/amd64,linux/s390x,linux/ppc64le"
spec:
  description: >-
    This task will set the status of the CI job to the specified value along
    with a link to the specified target URL where developers can follow the
    progress of the CI job.

    The `bitbucket-set-status` task allows external services to mark Bitbucket commits
    with an `INPROGRESS`, `SUCCESSFUL`, or `FAILED` state, which is then
    reflected in pull requests involving those commits. Statuses include a
    `description` and a `target_url` to give users information about the CI
    statuses or a direct link to the full log.
  volumes:
    - name: bitbuckettoken
      secret:
        secretName: $(params.BITBUCKET_TOKEN_SECRET_NAME)
  params:
    - name: BITBUCKET_HOST_URL
      description: |
        The Bitbucket host, adjust this if you run a Bitbucket server.
      default: "api.bitbucket.org"
      type: string
    - name: API_PATH_PREFIX
      description: |
        The API path prefix, Bitbucket may have a prefix for certain versions.
      default: "https://api.bitbucket.org/2.0/repositories/"
      type: string
    - name: REPO_FULL_NAME
      description: |
        The Bitbucket repository full name, e.g.: myorg/myrepo
      type: string
    - name: BITBUCKET_TOKEN_SECRET_NAME
      description: |
        The name of the kubernetes secret that contains the Bitbucket token, default: bitbucket
      type: string
      default: ci-bitbucket
    - name: BITBUCKET_TOKEN_SECRET_KEY
      description: |
        The key within the kubernetes secret that contains the Bitbucket token, default: token
      type: string
      default: token
    - name: SHA
      description: |
        Commit SHA to set the status for.
      type: string
    - name: TARGET_URL
      description: |
        The target URL to associate with this status. This URL will be linked
        from the Bitbucket UI to allow users to easily see the source of the
        status.
      type: string
    - name: DESCRIPTION
      description: |
        A short description of the status. Ignored when PIPELINE_STATUS is set.
      type: string
      default: ""
    - name: STATE
      description: |
        The state of the status. Can be one of the following `INPROGRESS`,
        `SUCCESSFUL`, or `FAILED`. Ignored when PIPELINE_STATUS is set.
      type: string
      default: ""
    - name: PIPELINE_STATUS
      description: |
        The aggregate execution status of the PipelineRun's tasks,
        $(tasks.status), passed by a single unguarded finally task. When set,
        the task derives the build status state, name and description from it
        (Succeeded, Failed, Completed, None) instead of using STATE/NAME/DESCRIPTION.
      type: string
      default: ""
    - name: AUTH_TYPE
      description: |
        The type of authentication to use. You could use the less secure "Basic" for example.
      type: string
      default: Basic
    - name: IMAGE
      description: |
        Image providing the python binary which this task uses.
      type: string
      default: {{ include "edp-tekton.registry" . }}/python:3.10.8-alpine3.16
    - name: SHEBANG
      description: |
        Python path. Depends on the image.
      type: string
      default: /usr/bin/env python
    - name: KEY
      description: |
        The key that holds the status, e.g., build, review, deploy.
      type: string
    - name: NAME
      description: |
        If the name field is present, it'll be displayed to users in the UI.
        Ignored when PIPELINE_STATUS is set.
      type: string
      default: ""
  steps:
    - name: set-status
      volumeMounts:
        - name: bitbuckettoken
          mountPath: /etc/bitbucket-set-status
      env:
        - name: BITBUCKET_HOST_URL
          value: $(params.BITBUCKET_HOST_URL)
        - name: API_PATH_PREFIX
          value: $(params.API_PATH_PREFIX)
        - name: REPO_FULL_NAME
          value: $(params.REPO_FULL_NAME)
        - name: BITBUCKET_TOKEN_SECRET_NAME
          value: $(params.BITBUCKET_TOKEN_SECRET_NAME)
        - name: BITBUCKET_TOKEN_SECRET_KEY
          value: $(params.BITBUCKET_TOKEN_SECRET_KEY)
        - name: SHA
          value: $(params.SHA)
        - name: TARGET_URL
          value: $(params.TARGET_URL)
        - name: DESCRIPTION
          value: $(params.DESCRIPTION)
        - name: STATE
          value: $(params.STATE)
        - name: PIPELINE_STATUS
          value: $(params.PIPELINE_STATUS)
        - name: AUTH_TYPE
          value: $(params.AUTH_TYPE)
        - name: SHEBANG
          value: $(params.SHEBANG)
        - name: KEY
          value: $(params.KEY)
        - name: NAME
          value: $(params.NAME)
        - name: QUEUE_CANCEL_REASON
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['app.edp.epam.com/queue-cancel-reason']

      image: $(params.IMAGE)
      script: |
        #!$(params.SHEBANG)

        """This script will set the CI status on Bitbucket PR with enhanced debugging"""

        import json
        import os
        import sys
        import http.client

        # Load the token
        bitbucket_token_filename = "/etc/bitbucket-set-status/" + \
            os.getenv("BITBUCKET_TOKEN_SECRET_KEY")
        bitbucket_token = open(bitbucket_token_filename, "r").read().strip()

        # Form the status URL
        status_url = os.getenv("API_PATH_PREFIX") + os.getenv("REPO_FULL_NAME") + "/commit/" + os.getenv("SHA") + "/statuses/build"

        state = os.getenv("STATE")
        description = os.getenv("DESCRIPTION")
        name = os.getenv("NAME")

        pipeline_status = os.getenv("PIPELINE_STATUS", "")
        # The cancel-reason annotation the pipeline queue (or the interceptor) stamps
        # in the same patch that cancels the run propagates to this pod. Its absence
        # on a cancelled run means the cancellation came from elsewhere (kubectl,
        # portal).
        cancel_reason = os.getenv("QUEUE_CANCEL_REASON", "")

        if pipeline_status:
            # Single-reporter mode: derive the state from the aggregate, so every
            # terminal shape is covered and no when-guard gap can leave the build
            # status unreported.
            if pipeline_status == "Succeeded":
                state, name, description = "SUCCESSFUL", "Pipeline (PASSED)", "Review Pipeline"
            elif pipeline_status == "Failed" and not cancel_reason:
                state, name, description = "FAILED", "Pipeline (FAILED)", "Review Pipeline"
            elif pipeline_status in ("Failed", "Completed"):
                # Failed with a stamped cancel reason: the cancellation caught a task
                # mid-flight. Completed: the cancellation landed between tasks (review
                # pipelines have no when-skipped regular tasks, so Completed can only
                # mean cancellation; manual cancels carry no annotation and land here).
                state, name = "STOPPED", "Pipeline (CANCELED)"
                description = "SUPERSEDED BY NEWER COMMIT" if cancel_reason == "superseded" else "CANCELED"
            else:
                # None: no aggregate available; not expected in a finally task.
                state, name, description = "FAILED", "Pipeline (UNKNOWN)", "Review Pipeline"
            print("Derived state '{state}' ({name}) from aggregate '{agg}'".format(
                state=state, name=name, agg=pipeline_status))
        elif state == "FAILED" and cancel_reason:
            # Explicit-STATE callers (e.g. build pipelines' failure vote): a gracefully
            # cancelled run reaches the failure task looking like a genuine failure.
            state = "STOPPED"
            description = "SUPERSEDED BY NEWER COMMIT" if cancel_reason == "superseded" else "CANCELED"
            name = name.replace("(FAILED)", "(CANCELED)")
            print("PipelineRun was gracefully cancelled ({reason}), reporting '{state}'".format(
                reason=cancel_reason, state=state))

        # Prepare the data
        data = {
            "state": state,
            "url": os.getenv("TARGET_URL"),
            "description": description,
            "key": os.getenv("KEY"),
            "name": name
        }

        authHeader = os.getenv("AUTH_TYPE") + " " + bitbucket_token
        headers = {
            "User-Agent": "TektonCD, the peaceful cat",
            "Authorization": authHeader,
            "Accept": "application/json",
            "Content-Type": "application/json"
        }

        # This is for our fake bitbucket server
        if "$(params.BITBUCKET_HOST_URL)".startswith("http://"):
            conn = http.client.HTTPConnection("$(params.BITBUCKET_HOST_URL)".replace("http://", ""))
        else:
            conn = http.client.HTTPSConnection("$(params.BITBUCKET_HOST_URL)")

        # Send the request
        conn.request("POST", status_url, body=json.dumps(data), headers=headers)

        resp = conn.getresponse()

        response_body = resp.read()

        if not str(resp.status).startswith("2"):
            print("Error: %d" % (resp.status))
            print(response_body)
            sys.exit(1)
        else:
            print("Bitbucket status '{state}' has been set on {repo}#{sha}".format(
                state=state,
                repo=os.getenv("REPO_FULL_NAME"),
                sha=os.getenv("SHA"),
                key=os.getenv("KEY"),
                name=name,)
            )
{{ end }}
