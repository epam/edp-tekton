apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: edp-c
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.17.0"
    tekton.dev/categories: Build Tools
    tekton.dev/tags: build-tool
    tekton.dev/platforms: "linux/amd64,linux/s390x,linux/ppc64le"
spec:
  description: >-
    This task can be used to run npm goals on a project
    where package.json is present and has some pre-defined
    npm scripts.
  params:
    - name: PATH_CONTEXT
      type: string
      default: "source"
      description: The path where package.json of the project is defined.
    - name: BASE_IMAGE
      type: string
      default: "golang:1.22-bookworm"
      description: The node image you want to use.
    - name: EXTRA_COMMANDS_INIT
      type: string
    - name: EXTRA_COMMANDS_BUILD
      type: string
    - name: EXTRA_COMMANDS_TEST
      type: string
  workspaces:
    - name: source

  steps:
    - name: init
      image: $(params.BASE_IMAGE)
      workingDir: $(workspaces.source.path)/$(params.PATH_CONTEXT)
      script: |
        set -ex



        $(params.EXTRA_COMMANDS_INIT)

    - name: build
      image: $(params.BASE_IMAGE)
      workingDir: $(workspaces.source.path)/$(params.PATH_CONTEXT)
      script: |
        set -ex



        $(params.EXTRA_COMMANDS_BUILD)

    - name: test
      image: $(params.BASE_IMAGE)
      workingDir: $(workspaces.source.path)/$(params.PATH_CONTEXT)
      script: |
        set -ex



        $(params.EXTRA_COMMANDS_TEST)

{{- include "resources" . | nindent 6 }}
