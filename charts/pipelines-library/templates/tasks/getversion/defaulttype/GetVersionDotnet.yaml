{{ if .Values.pipelines.deployableResources.tasks }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: get-version-dotnet-default
spec:
  description: >-
    This task retrieves the version information for a .NET project, generates a build version and VCS tag based on the current Unix epoch timestamp.
  workspaces:
    - name: source
      description: The workspace consisting of dotnet project.
  results:
    - name: VERSION
      description: "Application version"
    - name: VCS_TAG
      description: "VCS tag"
    - name: IS_TAG
      description: "CodebaseImageStream tag"
    - name: DEPLOYABLE_MODULE_DIR
      description: "Deployable module directory"
    - name: TIMESTAMP
      description: Current timestamp
  steps:
    - name: get-timestamp
      image: {{ include "edp-tekton.registry" . }}/alpine:3.18.9
      script: |
        ts=$(date "+%s")
        echo "Current Timestamp: ${ts}"
        printf "%s" "${ts}" > "$(results.TIMESTAMP.path)"

    - name: get-version
      image: {{ include "edp-tekton.registry" . }}/alpine:3.18.9
      workingDir: $(workspaces.source.path)
      script: |
        set -e

        DEPLOYABLE_MODULE=$(find ./ -name '*.csproj' | xargs awk  -F '[><]' '/<DeployableModule>/ {print $3}')

        VERSION=$(find ${DEPLOYABLE_MODULE} -name '*.csproj' | xargs awk  -F '[><]' '/<Version>/ {print $3}' | tr '[:upper:]' '[:lower:]')

        BUILD_VERSION=$(cat $(results.TIMESTAMP.path))
        VCS_TAG="${VERSION}-${BUILD_VERSION}"
        IS_TAG="${VCS_TAG}"

        echo "Application version - ${VCS_TAG}"
        echo "VCS tag - ${VCS_TAG}"
        echo "IS tag - ${IS_TAG}"

        printf "%s" "${VCS_TAG}" > "$(results.VERSION.path)"
        printf "%s" "${VCS_TAG}" > "$(results.VCS_TAG.path)"
        printf "%s" "${IS_TAG}" > "$(results.IS_TAG.path)"

        printf "%s" "." > "$(results.DEPLOYABLE_MODULE_DIR.path)"
{{ end }}
