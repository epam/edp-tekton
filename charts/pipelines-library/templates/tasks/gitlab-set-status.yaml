{{ if .Values.pipelines.deployableResources.tasks }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitlab-set-status
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/categories: Git
    tekton.dev/tags: gitlab, git
    tekton.dev/displayName: "Set Gitlab commit status"
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    This task will set the status of the CI job to the specified value along
    with a link to the specified target URL where developers can follow the
    progress of the CI job.

    The `gitlab-set-status` task allows external services to mark GitLab commits
    with an `error`, `failure`, `pending`, or `success` state, which is then
    reflected in merge requests involving those commits. Statuses include as well a
    `description` and a `target_url`, to give the user informations about the CI
    statuses or a direct link to the full log.
  params:
    - name: GITLAB_HOST_URL
      description: |
        The GitLab host, adjust this if you run a GitLab enterprise. In KRCI we use git_ssh_url
        value from the event payload, format: "git@example.com:mike/diaspora.git"
      default: "gitlab.com"
      type: string
    - name: API_PATH_PREFIX
      description: |
        The API path prefix, GitLab Enterprise has a prefix e.g. /api/v4
      default: "/api/v4"
      type: string
    - name: REPO_FULL_NAME
      description: |
        The GitLab repository full name, e.g.: tektoncd/catalog
      type: string
    - name: GITLAB_TOKEN_SECRET_NAME
      description: |
        The name of the kubernetes secret that contains the GitLab token, default: gitlab-api-secret
      type: string
      default: gitlab-api-secret
    - name: GITLAB_TOKEN_SECRET_KEY
      description: |
        The key within the kubernetes secret that contains the GitLab token, default: token
      type: string
      default: token
    - name: SHA
      description: |
        Commit SHA to set the status for.
      type: string
    - name: TARGET_URL
      description: |
        The target URL to associate with this status. This URL will be linked
        from the GitLab UI to allow users to easily see the source of the
        status.
      type: string
    - name: DESCRIPTION
      description: |
        A short description of the status. Ignored when PIPELINE_STATUS is set.
      type: string
      default: ""
    - name: CONTEXT
      description: |
        The GitLab context, A string label to differentiate this status from
        the status of other systems. ie: "continuous-integration/tekton"
      default: "continuous-integration/tekton"
      type: string
    - name: STATE
      description: |
        The state of the status. Can be one of the following `pending`,
        `running`, `success`, `failed`, or `canceled`. Ignored when
        PIPELINE_STATUS is set.
      type: string
      default: ""
    - name: PIPELINE_STATUS
      description: |
        The aggregate execution status of the PipelineRun's tasks,
        $(tasks.status), passed by a single unguarded finally task. When set,
        the task derives the commit state and description from it (Succeeded,
        Failed, Completed, None) instead of using STATE/DESCRIPTION.
      type: string
      default: ""

  steps:
    - name: set-status
      image: registry.access.redhat.com/ubi8/python-38@sha256:af6f93b81f9313de95966e8cd681edb9dbcb5fdbddc5a4cc365af8e4534096ef
      script: |
        #!/usr/libexec/platform-python

        import os
        import sys
        import json
        import http.client
        import urllib.parse

        GITLAB_TOKEN = os.getenv("GITLAB_TOKEN")
        GITLAB_HOST_URL = "ssh://$(params.GITLAB_HOST_URL)"
        API_PATH_PREFIX = "$(params.API_PATH_PREFIX)"
        REPO_FULL_NAME = "$(params.REPO_FULL_NAME)"
        SHA = "$(params.SHA)"
        STATE = "$(params.STATE)"
        CONTEXT = "$(params.CONTEXT)"
        TARGET_URL = "$(params.TARGET_URL)"
        DESCRIPTION = "$(params.DESCRIPTION)"

        PIPELINE_STATUS = "$(params.PIPELINE_STATUS)"
        # The cancel-reason annotation the pipeline queue (or the interceptor) stamps
        # in the same patch that cancels the run propagates to this pod. Its absence
        # on a cancelled run means the cancellation came from elsewhere (kubectl,
        # portal).
        CANCEL_REASON = os.getenv("QUEUE_CANCEL_REASON", "")

        if PIPELINE_STATUS:
            # Single-reporter mode: derive the state from the aggregate, so every
            # terminal shape is covered and no when-guard gap can leave the commit
            # status unreported.
            if PIPELINE_STATUS == "Succeeded":
                STATE, DESCRIPTION = "success", "PASSED"
            elif PIPELINE_STATUS == "Failed" and not CANCEL_REASON:
                STATE, DESCRIPTION = "failed", "FAILED"
            elif PIPELINE_STATUS in ("Failed", "Completed"):
                # Failed with a stamped cancel reason: the cancellation caught a task
                # mid-flight. Completed: the cancellation landed between tasks (review
                # pipelines have no when-skipped regular tasks, so Completed can only
                # mean cancellation; manual cancels carry no annotation and land here).
                STATE = "canceled"
                DESCRIPTION = "SUPERSEDED BY NEWER COMMIT" if CANCEL_REASON == "superseded" else "CANCELED"
            else:
                # None: no aggregate available; not expected in a finally task.
                STATE, DESCRIPTION = "failed", "UNKNOWN"
            print(f"Derived state '{STATE}' ({DESCRIPTION}) from aggregate '{PIPELINE_STATUS}'")
        elif STATE == "failed" and CANCEL_REASON:
            # Explicit-STATE callers (e.g. build pipelines' failure vote): a gracefully
            # cancelled run reaches the failure task looking like a genuine failure.
            STATE = "canceled"
            DESCRIPTION = "SUPERSEDED BY NEWER COMMIT" if CANCEL_REASON == "superseded" else "CANCELED"
            print(f"PipelineRun was gracefully cancelled ({CANCEL_REASON}), reporting '{STATE}'")

        headers = {
            "User-Agent": "TektonCD, the peaceful cat",
            "Authorization": f"Bearer {GITLAB_TOKEN}",
        }

        URLENCODED_REPO_NAME = urllib.parse.quote(REPO_FULL_NAME, safe="")

        params = {
            "state": STATE,
            "context": CONTEXT,
            "target_url": TARGET_URL,
            "description": DESCRIPTION
        }

        encoded_params = urllib.parse.urlencode(params)

        api_url = f"{API_PATH_PREFIX}/projects/{URLENCODED_REPO_NAME}/statuses/{SHA}?{encoded_params}"

        # we need to adapt to KRCI approach and extract the host from the git_ssh_url
        # which is in the format: git@example.com:mike/diaspora.git
        GITLAB_HOST_URL = urllib.parse.urlparse(GITLAB_HOST_URL).hostname

        print(f"POST to {GITLAB_HOST_URL}{api_url}")

        if GITLAB_HOST_URL.startswith("http://"):
            conn = http.client.HTTPConnection(GITLAB_HOST_URL[7:])
        elif GITLAB_HOST_URL.startswith("https://"):
            conn = http.client.HTTPSConnection(GITLAB_HOST_URL[8:])
        else:
            conn = http.client.HTTPSConnection(GITLAB_HOST_URL)
        try:
            conn.request("POST", api_url, headers=headers)

            resp = conn.getresponse()
            if not str(resp.status).startswith("2"):
                body = resp.read().decode()

                # GitLab enforces a state machine on commit statuses: posting a state
                # that is not a valid transition from an unfinished status in the same
                # context (e.g. `running` while a stuck previous run left the check
                # running) fails with 400 "Cannot transition status". The check already
                # shows a live state for this SHA and the next terminal post resets it,
                # so treat the conflict as already reported instead of failing the run.
                if resp.status == 400 and "Cannot transition status" in body:
                    print(f"Status of {REPO_FULL_NAME}#{SHA} already reports an active state, skipping '{STATE}'")
                    print(body)
                else:
                    print(f"{resp.status} | Unable to set status")
                    try:
                        print(json.dumps(json.loads(body), indent=4))
                    except ValueError:
                        print(body)
                    sys.exit(1)
            else:
                print(f"Just set status of {REPO_FULL_NAME}#{SHA} to {STATE}")
        finally:
            conn.close()

      env:
        - name: GITLAB_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.GITLAB_TOKEN_SECRET_NAME)
              key: $(params.GITLAB_TOKEN_SECRET_KEY)
        - name: QUEUE_CANCEL_REASON
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['app.edp.epam.com/queue-cancel-reason']
{{ end }}
