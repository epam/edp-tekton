{{- if .Values.pipelines.deployableResources.tasks }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: image-scan-remote
  labels:
    {{- include "edp-tekton.labels" . | nindent 4 }}
spec:
  description: >-
    This task scans container images from remote registries for vulnerabilities using Trivy
    (client/server mode) and uploads the scan reports to DefectDojo.
    Each image gets its own engagement under the product.
  workspaces:
    - name: source
  params:
    - name: IMAGE_NAMES
      type: array
      description: List of container images to be scanned in the format `registry/repository/image:tag`.
    - name: CODEBASE_NAME
      type: string
      description: Name of the codebase/component. Used as the DefectDojo product name.
    - name: DD_PRODUCT_TYPE_NAME
      type: string
      description: DefectDojo product type name
      default: "KubeRocketCI"
    - name: ci-defectdojo
      type: string
      description: Name of the secret holding the DefectDojo CI integration data
      default: ci-defectdojo
    - name: TRIVY_SERVER_URL
      type: string
      description: Trivy server URL for client/server mode. If empty, runs standalone.
      default: "http://trivy-service.trivy-system:4954"
    - name: BASE_IMAGE_TRIVY
      type: string
      default: "{{ include "edp-tekton.registry" . }}/aquasec/trivy:0.69.2"
    - name: BASE_IMAGE
      type: string
      default: "{{ include "edp-tekton.registry" . }}/epamedp/tekton-autotest:0.1.8"
  results:
    - name: SCAN_REPORT_URL
      description: DefectDojo URL with the generated vulnerability scan reports
  steps:
    - name: trivy
      args: ["$(params.IMAGE_NAMES[*])"]
      image: $(params.BASE_IMAGE_TRIVY)
      workingDir: $(workspaces.source.path)
      env:
        - name: TRIVY_SERVER_URL
          value: "$(params.TRIVY_SERVER_URL)"
      script: |
        #!/usr/bin/env sh

        SERVER_ARG=""
        if [ -n "${TRIVY_SERVER_URL}" ]; then
          SERVER_ARG="--server ${TRIVY_SERVER_URL}"
          echo "[INFO] Using Trivy server: ${TRIVY_SERVER_URL}"
        fi

        FAILED=0

        for IMAGE in "$@"; do
          IMAGE_NAME="${IMAGE%:*}"
          REPORT_KEY=$(echo "${IMAGE_NAME}" | tr '/' '_')
          REPORT_FILE="trivy-report-${REPORT_KEY}.json"

          echo "[INFO] Trivy scanning: ${IMAGE}"
          if trivy image ${SERVER_ARG} --format json -o "${REPORT_FILE}" "${IMAGE}"; then
            echo "[INFO] Trivy scan succeeded for ${IMAGE}"
          else
            echo "[WARN] Trivy failed to scan ${IMAGE}, skipping"
            rm -f "${REPORT_FILE}"
            FAILED=$((FAILED + 1))
          fi
        done

        echo "[INFO] Trivy scan complete. Failures: ${FAILED}"

    - name: upload-report
      args: ["$(params.IMAGE_NAMES[*])"]
      image: $(params.BASE_IMAGE)
      workingDir: $(workspaces.source.path)
      env:
        - name: DD_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: $(params.ci-defectdojo)
        - name: DD_HOST_URL
          valueFrom:
            secretKeyRef:
              key: url
              name: $(params.ci-defectdojo)
      script: |
        #!/usr/bin/env sh
        set -e

        UPLOADED=0
        LAST_ENGAGEMENT_NAME=""

        for IMAGE in "$@"; do
          IMAGE_NAME="${IMAGE%:*}"
          IMAGE_VER="${IMAGE##*:}"
          REPORT_KEY=$(echo "${IMAGE_NAME}" | tr '/' '_')
          REPORT_FILE="trivy-report-${REPORT_KEY}.json"
          ENGAGEMENT_NAME="image:${IMAGE_NAME}"

          if [ ! -f "${REPORT_FILE}" ]; then
            echo "[WARN] No Trivy report for ${IMAGE}, skipping upload"
            continue
          fi

          DD_VERSION_ARG=""
          if [ "${IMAGE_VER}" != "${IMAGE}" ]; then
            DD_VERSION_ARG="-F version=${IMAGE_VER}"
          fi

          echo "[INFO] Uploading Trivy Scan for: ${IMAGE} -> engagement: ${ENGAGEMENT_NAME}"

          HTTP_CODE=$(curl -s -o /tmp/dd-response.json -w '%{http_code}' \
            -X POST "${DD_HOST_URL}/api/v2/reimport-scan/" \
            -H "accept: application/json" \
            -H "Authorization: Token ${DD_TOKEN}" \
            -H "Content-Type: multipart/form-data" \
            -F "scan_date=$(date +%Y-%m-%d)" \
            -F "minimum_severity=Info" \
            -F "active=true" \
            -F "verified=false" \
            -F "scan_type=Trivy Scan" \
            -F "file=@${REPORT_FILE};type=application/json" \
            -F "product_type_name=$(params.DD_PRODUCT_TYPE_NAME)" \
            -F "product_name=$(params.CODEBASE_NAME)" \
            -F "engagement_name=${ENGAGEMENT_NAME}" \
            -F "auto_create_context=true" \
            -F "close_old_findings=true" \
            -F "push_to_jira=false" \
            -F "environment=Development" \
            -F "test_title=Trivy Scan" \
            ${DD_VERSION_ARG})

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "[ERROR] DefectDojo returned HTTP ${HTTP_CODE} for ${IMAGE}"
            cat /tmp/dd-response.json
            exit 1
          fi

          UPLOADED=$((UPLOADED + 1))
          LAST_ENGAGEMENT_NAME="${ENGAGEMENT_NAME}"
        done

        if [ "${UPLOADED}" -eq 0 ]; then
          echo "[INFO] No reports were uploaded to DefectDojo"
          printf "" > "$(results.SCAN_REPORT_URL.path)"
          exit 0
        fi

        PRODUCT_ID=$(curl -s -G "${DD_HOST_URL}/api/v2/products/" \
          --data-urlencode "name_exact=$(params.CODEBASE_NAME)" \
          -H "accept: application/json" \
          -H "Authorization: Token ${DD_TOKEN}" \
          | jq -r '.results[0].id')

        if [ "$#" -gt 1 ]; then
          SCAN_REPORT_URL="${DD_HOST_URL}/product/${PRODUCT_ID}"
        else
          ENGAGEMENT_ID=$(curl -s -G "${DD_HOST_URL}/api/v2/engagements/" \
            --data-urlencode "product=${PRODUCT_ID}" \
            --data-urlencode "name=${LAST_ENGAGEMENT_NAME}" \
            -H "accept: application/json" \
            -H "Authorization: Token ${DD_TOKEN}" \
            | jq -r '.results[0].id')
          SCAN_REPORT_URL="${DD_HOST_URL}/engagement/${ENGAGEMENT_ID}"
        fi

        printf "%s" "$SCAN_REPORT_URL" > "$(results.SCAN_REPORT_URL.path)"
{{- end }}
