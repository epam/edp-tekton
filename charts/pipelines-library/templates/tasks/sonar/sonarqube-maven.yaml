{{ if .Values.pipelines.deployableResources.tasks }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sonarqube-maven
  labels:
    app.kubernetes.io/version: "0.2"
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/categories: Security
    tekton.dev/tags: security
    tekton.dev/displayName: "sonarqube scanner"
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    The sonarqube-scanner Task will update parameters in the
    sonar-project.properties file or create a new sonar-project.properties
    file and put parameters of a sonar project into it.

    Task will run sonar-scanner for scanning after preparing the sonar-project.properties file.

  workspaces:
    - name: source
  volumes:
    - name: settings-maven
      configMap:
        name: {{ .Values.tekton.configs.mavenConfigMap }}
  params:
    - name: SONAR_PROJECT_KEY
      description: Project's unique key
      default: ""
    - name: SONAR_PROJECT_NAME
      description: Project's unique name
      default: ""
    - name: SONAR_QUALITYGATE_WAIT
      description: Forces the analysis step to poll the SonarQube instance and wait for the Quality Gate status.
      default: "true"
    - name: ci-nexus
      type: string
      description: name of the secret holding the Nexus CI integration data
      default: ci-nexus
    - name: ci-sonarqube
      type: string
      description: name of the secret holding the Sonarqube CI integration data
      default: "ci-sonarqube"
    - name: branch
      type: string
      description: Branch of scanning (for build pipeline)
      default: ""
    - name: target-branch
      type: string
      description: Target branch of Merge Request
      default: ""
    - name: source-branch
      type: string
      description: Source branch of Merge Request
      default: ""
    - name: key-id
      type: string
      description: Change number from Merge Request
      default: ""
    - name: CONTEXT_DIR
      type: string
      description: >-
        The context directory within the repository for sources on
        which we want to execute maven goals.
      default: "source"
    - name: MAVEN_IMAGE
      type: string
      description: Maven base image
      default: {{ include "edp-tekton.registry" . }}/maven:3.9.0-eclipse-temurin-11
    - name: EXTRA_COMMANDS
      description: maven goals to run
      type: array
      default:
        - "package"
    - name: step_prepare_project_image
      type: string
      default: "{{ include "edp-tekton.registry" . }}/epamedp/tekton-autotest:0.1.8"
  steps:
    - image: $(params.step_prepare_project_image)
      name: prepare-project
      workingDir: $(workspaces.source.path)
      env:
        - name: SONAR_HOST_URL
          valueFrom:
            secretKeyRef:
              name: $(params.ci-sonarqube)
              key: url
        - name: SONAR_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.ci-sonarqube)
              key: token
        - name: SONAR_PROJECT_KEY
          value: "$(params.SONAR_PROJECT_KEY)"
        - name: SONAR_PROJECT_NAME
          value: "$(params.SONAR_PROJECT_NAME)"
      script: |
        set -e

        if [[ "$SONAR_HOST_URL" == *"sonarcloud.io"* ]]; then
          # --- SonarCloud path ---
          # SonarCloud root URL returns HTTP 307 (redirect to login page).
          # /api/system/status always returns 200 with JSON when the service is reachable.
          SONAR_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SONAR_HOST_URL}/api/system/status") || SONAR_STATUS="503"
          if [[ "$SONAR_STATUS" != "200" ]]; then
            echo "SonarCloud is not available (HTTP ${SONAR_STATUS}). Please check the URL and token."
            exit 1
          fi
          echo "SonarCloud mode: project auto-creation skipped. The project must exist in SonarCloud UI."
        else
          # --- SonarQube (self-hosted) path — unchanged ---
          SONAR_STATUS=$(curl -s -I -w "%{http_code}" -o /dev/null ${SONAR_HOST_URL}) || SONAR_STATUS="503"

          if [[ "$SONAR_STATUS" != "200" ]]; then
            echo -e "SonarQube is not available\nPlease check the connection to SonarQube"
            exit 1
          fi

          # Check if project exists
          SONAR_RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/components/show?component=${SONAR_PROJECT_KEY}")

          # Check token is valid
          if [[ -z "$SONAR_RESPONSE" ]]; then
            echo "Token isn't valid or not defined"
            exit 1
          fi

          # Create project if it doesn't exist or skip if it does
          if echo "$SONAR_RESPONSE" | jq -e '.errors[0].msg' &>/dev/null; then
            default_branch=$(kubectl get codebase $SONAR_PROJECT_NAME -o jsonpath='{.spec.defaultBranch}')
            echo "Create project ${SONAR_PROJECT_KEY}"
            curl -X POST -u ${SONAR_TOKEN}: "${SONAR_HOST_URL}/api/projects/create?name=${SONAR_PROJECT_KEY}&project=${SONAR_PROJECT_KEY}&mainBranch=${default_branch}"
          else
            if echo "$SONAR_RESPONSE" | jq -e '.component.key' &>/dev/null; then
              echo "Project \"$SONAR_PROJECT_KEY\" already exists"
            else
              echo "Unknown Response format"
            fi
          fi
        fi
    - name: prepare-sonar-override
      image: $(params.step_prepare_project_image)
      workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)
      env:
        - name: SONAR_HOST_URL
          valueFrom:
            secretKeyRef:
              name: $(params.ci-sonarqube)
              key: url
      script: |
        #!/bin/bash
        set -e

        if [[ "$SONAR_HOST_URL" == *"sonarcloud.io"* ]]; then
          # SonarQube only: projectKey comes from pipeline param via EXTRA_COMMANDS.
          # For SonarCloud, the key follows the "<org-key>_<codebase-name>" pattern
          # that the pipeline param (plain codebase name) does not match.
          # We read the correct key from pom.xml and append it at the end of the
          # mvn command so it overrides the pipeline param value (last -D wins in JVM).
          SONAR_KEY=$(grep -o '<sonar\.projectKey>[^<]*</sonar\.projectKey>' pom.xml \
            | sed 's|<[^>]*>||g' | tr -d '[:space:]')
          if [[ -z "$SONAR_KEY" ]]; then
            echo "ERROR: sonar.projectKey not found in pom.xml <properties>."
            echo "For SonarCloud, add <sonar.projectKey><org-key>_<codebase-name></sonar.projectKey>."
            exit 1
          fi
          echo "SonarCloud mode: will override projectKey with '${SONAR_KEY}' from pom.xml."
          echo "-Dsonar.projectKey=${SONAR_KEY}" > $(workspaces.source.path)/.sonar-key-override
        else
          echo "" > $(workspaces.source.path)/.sonar-key-override
        fi

    - name: mvn-goals
      image: $(params.MAVEN_IMAGE)
      volumeMounts:
        - name: settings-maven
          mountPath: /var/configmap
      workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)
      command: ["/bin/sh", "-c"]
      args:
        - |
          SONAR_KEY_OVERRIDE=$(cat $(workspaces.source.path)/.sonar-key-override 2>/dev/null)
          /usr/bin/mvn -s /var/configmap/settings.xml "$@" ${SONAR_KEY_OVERRIDE}
        - "--"
        - $(params.EXTRA_COMMANDS[*])
      env:
        - name: HOME
          value: $(workspaces.source.path)
        - name: SONAR_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.ci-sonarqube)
              key: token
        - name: SONAR_HOST_URL
          valueFrom:
            secretKeyRef:
              name: $(params.ci-sonarqube)
              key: url
        - name: CI_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.ci-nexus)
              key: username
        - name: CI_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.ci-nexus)
              key: password
{{- include "resources" . | nindent 6 }}
{{ end }}
