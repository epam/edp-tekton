# Default values for edp-tekton.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""

# -- Cluster name used to construct the krci-portal pipeline URL (/c/<clusterName>/...).
# Must match krci-portal configEnv.DEFAULT_CLUSTER_NAME. If left empty, falls back to the first segment of global.dnsWildCard.
clusterName: ""

# -- Portal host used to build pipeline links in commit statuses and reporter PR comments.
# Set this when the krci-portal ingress uses a custom host. If left empty, defaults to the
# krci-portal chart's default host krci-portal-<namespace>.<global.dnsWildCard>.
portalHost: ""

pipelines:
  image:
    # -- Registry for tekton pipelines images. Default: docker.io
    registry: "docker.io"
    # -- Node.js image tag used across all npm/pnpm pipelines and tasks
    nodejsTag: "24.18.0-alpine3.24"

  # -- List of image pull secrets used by the Tekton ServiceAccount for pulling images from private registries.
  # Example:
  # imagePullSecrets:
  #   - name: regcred
  imagePullSecrets: []

  # -- This section contains the list of pipelines and tasks that will be installed.
  deployableResources:
    # -- This flag control the installation of the tasks.
    tasks: true
    # -- This flag control the installation of the Deploy pipelines.
    deploy: true
    # -- This section control the installation of the review and build pipelines.
    c:
      cmake: true
      make: true
    cs:
      dotnet3.1: false
      dotnet6.0: false
    docker: true
    gitops: true
    groovy: true
    go:
      beego: true
      gin: true
      operatorsdk: true
    helm: true
    helm-pipeline: true
    infrastructure: true
    java:
      java17: true
      java21: true
      java25: true
      # -- This parameter disables the Sonar check for Java 25, as it is not currently supported.
      # Ref: https://docs.sonarsource.com/sonarqube-community-build/analyzing-source-code/languages/java#suoported-versions
      java25SkipSonar: true
    js:
      npm:
        angular: true
        antora: true
        express: true
        next: true
        react: true
        vue: true
      pnpm:
        angular: true
        antora: true
        express: true
        next: true
        react: true
        vue: true
    opa: false
    python:
      ansible: true
      flask: true
      fastapi: true
      python3.13: false
    security: true
    terraform: true
    autotests: true

  # -- This section allows to determine on which nodes to run tekton pipelines
  podTemplate: []
    # nodeSelector:
    #   role: tekton
    # tolerations:
    #   - effect: NoSchedule
    #     key: role
    #     operator: Equal
    #     value: tekton

  # -- Cancel in-progress review PipelineRuns when a new commit is pushed to the same
  # Pull Request / Merge Request / Gerrit change. Handled entirely by the KRCI
  # interceptor - no extra components are required. Cancellation is graceful
  # (spec.status: CancelledRunFinally), so finally tasks of the superseded run still execute.
  cancelInProgress: false

  # Settings for review PipelineRun queueing with the tekton-pipeline-queue operator.
  queue:
    # -- Post a pending/QUEUED commit status from the interceptor at webhook time,
    # so a review PipelineRun waiting in the queue shows a check in the VCS UI
    # before it starts. Covers gitlab, github and bitbucket.
    enabled: false
    # -- Create review PipelineRuns in the Pending state (spec.status: PipelineRunPending),
    # so a PipelineRunQueue decides when they start. Requires the tekton-pipeline-queue
    # operator; without it Pending PipelineRuns never start.
    pendingPipelineRun: false

  # -- Argo CD Diff Preview settings for the GitOps review pipelines. When enabled, the
  # gitops review pipeline renders an MR manifest diff via the standing argocd-diff-preview
  # vcluster (installed by the argocd-diff-preview cluster addon) and posts it as an MR
  # comment; it stays best-effort at runtime and skips silently if the addon is unhealthy.
  argocdDiffPreview:
    # -- Install the diff-preview task and wire it into the gitops review pipeline. Enable
    # this together with the argocd-diff-preview cluster addon; leave disabled otherwise.
    enabled: false
    # -- Namespace of the argocd-diff-preview vcluster addon.
    namespace: argocd-diff-preview
    # -- Kubeconfig secret exported by the vcluster addon.
    kubeconfigSecret: vc-argocd-diff-preview
    # -- Namespace of the Argo CD instance inside the argocd-diff-preview vcluster
    # (must match the addon's embedded Argo CD bootstrap configuration).
    innerArgocdNamespace: argocd
    # -- argocd-diff-preview tool image.
    toolImage: dagandersen/argocd-diff-preview:v0.2.11
    # -- Utility image with git/kubectl/jq/yq for the connect and prepare-and-export steps.
    utilImage: alpine/k8s:1.33.4
    # -- Python image for posting the MR comment.
    commentImage: python:3.12-alpine
    # -- Maximum time in seconds to wait for Argo CD to render all applications.
    renderTimeoutSeconds: "300"

global:
  # By defining gitProviders you install the corresponding Kubernetes resources for the selected Git Provider:
  # Pipelines, EventListener, Tasks, etc.
  # -- Deploy Kubernetes Resources for the specific Git Provider. Can be gerrit, gitlab, github (default)
  gitProviders:
    - bitbucket
    - gerrit
    - github
    - gitlab

  # -- Gerrit SSH node port, must be specified if gerrit is enabled
  # gerritSSHPort: "30003"
  # -- Gerrit Host URL, must be specified if gerrit is enabled
  gerritHost: "gerrit"

  # -- a cluster DNS wildcard name
  dnsWildCard: ""

  # -- platform type that can be "kubernetes" or "openshift"
  platform: "kubernetes"

  # -- Gateway API parent Gateway that EventListener HTTPRoutes attach to (nginx-ingress -> Envoy Gateway migration).
  # Used only when a gitServer sets eventListener.httproute.enabled=true; ignored otherwise.
  gatewayApi:
    # -- Name of the parent Gateway resource
    gatewayName: "main-gateway"
    # -- Namespace of the parent Gateway resource
    gatewayNamespace: "envoy-gateway-system"

  dockerRegistry:
    # -- Define Image Registry that will to be used in Pipelines. Can be ecr (default), harbor, dockerhub
    type: "ecr"
    # -- Docker Registry endpoint. In dockerhub case the URL must be specified in accordance with the Kaniko name convention (docker.io/<registry_space>)
    url: "<AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/<registry_space>"

## The tekton-cache related configurations.
# Ref: https://github.com/epam/edp-tekton/blob/master/charts/tekton-cache/values.yaml
tekton-cache:
  # -- Enables the Tekton-cache subchart.
  enabled: true
  #
  # If 'tekton-cache.enabled' is set to 'false' the tekton-cache won't be deployed as part of the KubeRocketCI installation,
  # but it can be deployed separately to share among different instances.
  # For this case, use the following pattern for the url: "http://<service_name>.<namespace>:8080".
  # Where,
  # <service_name> is the Kubernetes service name of the tekton-cache Helm chart, by default: tekton-cache;
  # <namespace> is the Kubernetes namespace where the Kubernetes service of the tekton-cache Helm chart is deployed.
  #
  # -- Defines the URL to the tekton-cache. Default: http://tekton-cache:8080
  url: "http://tekton-cache:8080"

  # -- Optional array of imagePullSecrets containing private registry credentials
  ## Ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry
  # imagePullSecrets: []
  # - name: regcred

## The Tekton Reporter configuration.
# The reporter watches finished review PipelineRuns and publishes a pull request
# comment with the per-task status table and the trailing logs of failed steps.
# Pipeline links in the comments are built from the top-level portalHost and
# clusterName values.
#
# SECURITY NOTE: published logs come from pipeline steps that execute the pull
# request's own code. Secret values referenced by those steps are masked on a
# best-effort basis (raw value plus common base64/hex encodings), but this is
# not a hard security boundary — a malicious author can print an arbitrarily
# transformed secret that masking cannot recognise. Only enable this for
# pipelines whose secret-bearing steps do not run untrusted code, or whose
# injected secrets have a blast radius limited to the build itself.
reporter:
  # -- Deploy the Tekton Reporter as a part of the pipeline library when true. Default: true
  enabled: true

  nameOverride: "tekton-reporter"

  # -- Number of trailing log lines published for every failed step
  tailLines: 100

  # -- Report comment strategy: 'update' edits the previous report comment of the same pull request, 'new' always creates a new comment
  commentStrategy: update

  image:
    repository: epamedp/edp-tekton
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag:

  imagePullSecrets: []

  serviceAccount:
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use.
    # -- If not set, a name is generated using the fullname template
    name: ""

  podAnnotations: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532

  # -- Additional volumes, e.g. a ConfigMap with a private CA certificate for git servers with self-signed TLS
  extraVolumes: []
  # extraVolumes:
  #   - name: git-ca
  #     configMap:
  #       name: git-ca

  # -- Additional volume mounts, e.g. mount a private CA into /etc/ssl/certs to trust it
  extraVolumeMounts: []
  # extraVolumeMounts:
  #   - name: git-ca
  #     mountPath: /etc/ssl/certs/git-ca.crt
  #     subPath: ca.crt
  #     readOnly: true

  # -- The resource limits and requests for the Tekton Reporter
  resources:
    limits:
      memory: 128Mi
      cpu: 100m
    requests:
      cpu: 50m
      memory: 64Mi

  # -- Node labels for pod assignment
  nodeSelector: {}
  # -- Toleration labels for pod assignment
  tolerations: []
  # -- Affinity settings for pod assignment
  affinity: {}

# Kaniko configuration section
kaniko:
  # -- AWS IAM role to be used for kaniko pod service account (IRSA). Format: arn:aws:iam::<AWS_ACCOUNT_ID>:role/<AWS_IAM_ROLE_NAME>
  roleArn: ""
  image:
    repository: gcr.io/kaniko-project/executor
    tag: v1.12.1
  # -- Set up true if external docker registry use custom certificate
  # -- Save cert in secret "custom-ca-certificates" with key ca.crt
  customCert: false


# -- Enabling this feature ensures that Tekton pipelines trigger only when the repo owner creates a PR.
# More information: https://tekton.dev/docs/triggers/interceptors/#owners-validation-for-pull-requests
githubOwners:
  enabled: true
  # This value is needed for private repos or when checkType is set to orgMembers or repoMembers or all
  checkType: "all"

# Tekton configuration section
tekton:
  # Settings for the 'package-registries-auth-secret' secret that contains package registries authentication information.
  #
  # This secret is used for authenticating to package registries when pulling or pushing artifacts in Tekton Pipelines.
  #
  # By default, the Maven settings.xml file supports the following environment variables:
  # environment variables    | description
  # ==============================================================================
  # CI_GITLAB_TOKEN_TYPE     | The type of the token used for GitLab authentication, usually "Private-Token"
  # CI_GITLAB_TOKEN          | GitLab token used for authentication to push to the GitLab registry
  # CI_GITHUB_USERNAME       | GitHub username used for authentication to push to the GitHub registry
  # CI_GITHUB_PASSWORD       | GitHub password or personal access token used for authentication
  # CI_AZURE_DEVOPS_USERNAME | Azure DevOps username used for authentication to push to the Azure DevOps registry
  # CI_AZURE_DEVOPS_PASSWORD | Azure DevOps password or personal access token used for authentication
  #
  # To use additional environment variables in files such as Maven settings.xml,
  # include them in this secret. They will be accessible in the configuration files.
  #
  packageRegistriesSecret:
    # -- Set this as `true` if the secret should be available in Pipelines
    enabled: false
    # -- Secret name that will be used in Pipelines. Default: package-registries-auth-secret
    name: "package-registries-auth-secret"

  # Reference to configuration map containing settings.xml file to overwrite the default configuration.
  configs:
    # -- Default configuration map for provisioning Maven settings.xml file.
    # To use custom Maven settings.xml configuration file, the user should prepare another configuration map and update "mavenConfigMap".
    # For reference see https://github.com/epam/edp-tekton/blob/master/charts/pipelines-library/templates/resources/cm-maven-settings.yaml
    mavenConfigMap: "custom-maven-settings"
    # To use custom init.gradle file, the user should prepare another configuration map and update "gradleConfigMap".
    # For reference see https://github.com/epam/edp-tekton/blob/master/charts/pipelines-library/templates/resources/cm-gradle-settings.yaml.
    # -- Default configuration maps for provisioning init.gradle file, REPOSITORY_SNAPSHOTS_PATH and REPOSITORY_RELEASES_PATH environment variables.
    gradleConfigMap: "custom-gradle-settings"
    # -- Default configuration maps for provisioning NPM .npmrc files.
    # To use custom NPM .npmrc configuration file, the user should prepare another configuration map and update "npmConfigMap".
    # For reference see https://github.com/epam/edp-tekton/blob/master/charts/pipelines-library/templates/resources/cm-npm-settings.yaml
    npmConfigMap: "custom-npm-settings"
    # To use custom Python settings, the user should prepare another configuration map and update "pythonConfigMap".
    # For reference see https://github.com/epam/edp-tekton/blob/master/charts/pipelines-library/templates/resources/cm-python-settings.yaml
    # -- Default configuration maps for provisioning PIP_TRUSTED_HOST, PIP_INDEX_PATH, PIP_INDEX_URL_PATH,
    # REPOSITORY_SNAPSHOTS_PATH and REPOSITORY_RELEASES_PATH environment variables for Python tasks.
    pythonConfigMap: "custom-python-settings"
    # To use custom NuGet settings, the user should prepare another configuration map and update "nugetConfigMap".
    # For reference see https://github.com/epam/edp-tekton/blob/master/charts/pipelines-library/templates/resources/cm-nuget-settings.yaml.
    # -- Default configuration maps for provisioning nuget.config file.
    nugetConfigMap: "custom-nuget-settings"

  # Pruner provides auto clean up feature for the Tekton resources
  pruner:
    # -- Specifies whether a cronjob should be created
    create: true
    # -- How often to clean up resources
    schedule: "0 10 */1 * *"
    # -- Docker image to run the pruner, expected to have kubectl and jq
    image: docker.io/epamedp/kubectl:0.1.1
    # -- List of ImagePullSecrets to be used by the pruner CronJob
    imagePullSecrets: []
    # -- Pod resources for Tekton pruner job
    resources:
      limits:
        cpu: "100m"
        memory: "70Mi"
      requests:
        cpu: "50m"
        memory: "50Mi"

  # -- Tekton workspace size. Most cases 1Gi is enough. It's common for all pipelines
  workspaceSize: "7Gi"
  # -- The resource limits and requests for the Tekton Tasks
  resources:
    limits:
      cpu: "2"
      memory: "3Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  # -- Defines which image build and verification tools Tekton pipelines use.
  # buildTool options: kaniko | buildkit
  containerBuildTool: kaniko

# Deploy KubeRocketCI Tekton Interceptor along with pipelines library
interceptor:
  # -- Deploy KubeRocketCI interceptor as a part of pipeline library when true. Default: true
  enabled: true

  # -- Interceptor log level (debug, info, warn, error). debug additionally logs
  # the full webhook request/response payloads.
  logLevel: info

  nameOverride: "tekton-interceptor"

  image:
    repository: epamedp/edp-tekton
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag:

  imagePullSecrets: []

  serviceAccount:
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use.
    # -- If not set, a name is generated using the fullname template
    name: ""

  podAnnotations: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532

  # -- Additional volumes, e.g. a ConfigMap with a private CA certificate for git servers
  # with self-signed TLS (required for pipelines.queue.enabled against such servers)
  extraVolumes: []
  # extraVolumes:
  #   - name: git-ca
  #     configMap:
  #       name: git-ca

  # -- Additional volume mounts, e.g. mount a private CA into /etc/ssl/certs to trust it
  extraVolumeMounts: []
  # extraVolumeMounts:
  #   - name: git-ca
  #     mountPath: /etc/ssl/certs/git-ca.crt
  #     subPath: ca.crt
  #     readOnly: true

  # -- The resource limits and requests for the Tekton Interceptor
  resources:
    limits:
      memory: 60Mi
      cpu: 70m
    requests:
      cpu: 50m
      memory: 40Mi

  # -- Node labels for pod assignment
  nodeSelector: {}
  # -- Toleration labels for pod assignment
  tolerations: []
  # -- Affinity settings for pod assignment
  affinity: {}

ctLint:
  validateMaintainers: false
  chartSchema: |
    name: str()
    home: str()
    version: str()
    type: str()
    apiVersion: str()
    appVersion: any(str(), num())
    description: str()
    keywords: list(str(), required=False)
    sources: list(str(), required=True)
    maintainers: list(include('maintainer'), required=True)
    dependencies: list(include('dependency'), required=False)
    icon: str(required=False)
    engine: str(required=False)
    condition: str(required=False)
    tags: str(required=False)
    deprecated: bool(required=False)
    kubeVersion: str(required=False)
    annotations: map(str(), str(), required=False)
    ---
    maintainer:
      name: str(required=True)
      email: str(required=False)
      url: str(required=False)
    ---
    dependency:
      name: str()
      version: str()
      repository: str()
      condition: str(required=False)
      tags: list(str(), required=False)
      enabled: bool(required=False)
      import-values: any(list(str()), list(include('import-value')), required=False)
      alias: str(required=False)
  lintconf: |
    ---
    rules:
      braces:
        min-spaces-inside: 0
        max-spaces-inside: 0
        min-spaces-inside-empty: -1
        max-spaces-inside-empty: -1
      brackets:
        min-spaces-inside: 0
        max-spaces-inside: 0
        min-spaces-inside-empty: -1
        max-spaces-inside-empty: -1
      colons:
        max-spaces-before: 0
        max-spaces-after: 1
      commas:
        max-spaces-before: 0
        min-spaces-after: 1
        max-spaces-after: 1
      comments:
        require-starting-space: true
        min-spaces-from-content: 2
      document-end: disable
      document-start: disable           # No --- to start a file
      empty-lines:
        max: 2
        max-start: 0
        max-end: 0
      hyphens:
        max-spaces-after: 1
      indentation:
        spaces: consistent
        indent-sequences: whatever      # - list indentation will handle both indentation and without
        check-multi-line-strings: false
      key-duplicates: enable
      line-length: disable              # Lines can be any length
      new-line-at-end-of-file: enable
      new-lines:
        type: unix
      trailing-spaces: enable
      truthy:
        level: warning

# Labels used to tag ConfigMaps that contain Grafana dashboards.
# These labels allow Grafana to discover and load dashboard ConfigMaps.
grafana:
  enabled: false
  dashboards:
    labelKey: grafana_dashboard
    labelValue: "1"
  # Label applied to the ServiceMonitor resource.
  # This label is used by Prometheus to discover and integrate the ServiceMonitor
  # into its configuration, allowing Prometheus to scrape metrics from the
  # services specified by the ServiceMonitor.
  serviceMonitor:
    prometheusReleaseLabels:
      release: prom

