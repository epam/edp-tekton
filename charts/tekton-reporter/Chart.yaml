apiVersion: v2
name: tekton-reporter
home: https://docs.kuberocketci.io
description: A Helm chart for KubeRocketCI Tekton Reporter that publishes review PipelineRun results as pull request comments
type: application
# Versioned in lockstep with the edp-tekton chart: the reporter ships in the
# shared epamedp/edp-tekton image, so its default image tag (appVersion) must
# match. Bump together with charts/pipelines-library on release.
version: 0.25.0-SNAPSHOT
appVersion: 0.25.0-SNAPSHOT
icon: https://docs.kuberocketci.io/img/logo.svg
keywords:
  - edp
  - tekton
  - ci
  - reporter
  - pull-request
maintainers:
  - name: epmd-edp
    email: SupportEPMD-EDP@epam.com
    url: https://solutionshub.epam.com/solution/kuberocketci
  - name: sergk
    url: https://github.com/SergK
sources:
  - https://github.com/epam/edp-tekton
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: KubeRocketCI Documentation
      url: https://docs.kuberocketci.io
    - name: EPAM SolutionHub
      url: https://solutionshub.epam.com/solution/kuberocketci
