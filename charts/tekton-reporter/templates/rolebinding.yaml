apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tekton-reporter.name" . }}
  labels:
    {{- include "tekton-reporter.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tekton-reporter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tekton-reporter.name" . }}
